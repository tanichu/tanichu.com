<header class="site-header">
  <nav class="navbar">
    <div class="container">
      <a class="site-title" href="{{ .Site.Home.RelPermalink }}">{{ .Site.Title }}</a>
      <div class="nav-right">
        <ul class="nav-links">
          {{ range .Site.Menus.main }}
          <li><a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        </ul>
        <div class="lang-switch">
          {{ if .IsTranslated }}
            {{ range .Translations }}
            <a href="{{ .RelPermalink }}" class="lang-btn">{{ .Language.LanguageName }}</a>
            {{ end }}
          {{ else }}
            {{ range .Site.Languages }}
              {{ if ne .Lang $.Site.Language.Lang }}
              <a href="{{ .Lang | printf "/%s/" }}" class="lang-btn">{{ .LanguageName }}</a>
              {{ end }}
            {{ end }}
          {{ end }}
        </div>
      </div>
    </div>
  </nav>
</header>
