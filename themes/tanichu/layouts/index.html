{{ define "hero" }}
<div class="hero">
  <img src="{{ "images/hero.jpg" | relURL }}" alt="Tadahiro Taniguchi">
</div>
{{ end }}

{{ define "main" }}
<div class="about-page">
  <div class="about-header">
    <h1>{{ .Language.Params.profileName | default "Tadahiro Taniguchi" }}</h1>
    <p class="subtitle">{{ .Language.Params.profileTitle | default "Professor, Kyoto University" }}</p>
  </div>
  <div class="about-content">
    {{ .Content }}
  </div>
</div>
{{ end }}
